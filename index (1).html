<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peachza Store | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --peach: #FFB38A;
            --peach-light: #FFD4B8;
            --peach-glow: rgba(255, 179, 138, 0.35);
            --pink: #FF6B9D;
            --pink-glow: rgba(255, 107, 157, 0.3);
            --cream: #FFF5EE;
            --bg: #0A0608;
            --card: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 179, 138, 0.15);
            --card-border-hover: rgba(255, 179, 138, 0.45);
            --text-dim: rgba(255, 245, 238, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px 16px 60px;
            overflow-x: hidden;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 70% 50% at 15% 20%, rgba(255, 107, 157, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 60% at 85% 75%, rgba(255, 179, 138, 0.10) 0%, transparent 60%),
                #0A0608;
        }

        /* subtle noise texture */
        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
        }

        canvas#star-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* ── ENTRY LAYER ── */
        #entry-layer {
            position: fixed;
            inset: 0;
            background: #0A0608;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }
        #entry-layer.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .entry-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--card-border);
            animation: entryPulse 2.5s ease-in-out infinite;
        }
        @keyframes entryPulse {
            0%, 100% { box-shadow: 0 0 0 0 var(--peach-glow), 0 0 20px var(--peach-glow); }
            50%       { box-shadow: 0 0 0 16px transparent,   0 0 50px var(--pink-glow); }
        }

        .entry-title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--peach-light), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .entry-hint {
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
            animation: blink 2s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ── MAIN CONTAINER ── */
        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 1;
            transform: none;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .container.hidden {
            opacity: 0;
            transform: translateY(12px);
        }

        /* ── CARD BASE ── */
        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            border-color: var(--card-border-hover);
            box-shadow: 0 0 30px rgba(255, 179, 138, 0.08);
        }

        /* ── PROFILE CARD ── */
        .profile-card {
            padding: 28px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0;
            position: relative;
            overflow: hidden;
        }

        /* decorative top streak */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--peach), transparent);
        }

        .avatar-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            background-clip: padding-box;
            position: relative;
            z-index: 1;
            transition: box-shadow 0.05s;
        }

        /* gradient ring */
        .avatar-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--peach), var(--pink), #a78bfa);
            z-index: 0;
            animation: ringRotate 4s linear infinite;
        }
        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }
        /* mask inner */
        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: #14090d;
        }

        .view-badge {
            position: absolute;
            bottom: 2px; right: -4px;
            background: rgba(10,6,8,0.9);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2px 7px;
            font-size: 10px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
            white-space: nowrap;
        }
        .view-badge i { color: var(--peach); font-size: 9px; }

        .profile-name {
            font-family: 'Outfit', sans-serif;
            font-size: 21px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 30%, var(--peach-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-role {
            margin-top: 4px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .profile-bio {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.7;
        }

        .bio-tag {
            display: inline-block;
            background: rgba(255, 179, 138, 0.1);
            border: 1px solid rgba(255, 179, 138, 0.2);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            color: var(--peach-light);
            margin: 2px 2px 0;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,179,138,0.12), transparent);
            margin: 14px 0;
        }

        /* ── SOCIALS ── */
        .socials {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .social-btn {
            width: 38px; height: 38px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 15px;
            text-decoration: none;
            transition: all 0.25s;
        }
        .social-btn:hover {
            background: rgba(255, 179, 138, 0.12);
            border-color: rgba(255, 179, 138, 0.4);
            color: var(--peach-light);
            transform: translateY(-2px);
        }

        /* ── MAIN CTA ── */
        .cta-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--cream);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,179,138,0.10));
            border: 1px solid rgba(255,179,138,0.25);
            transition: all 0.3s;
        }
        .cta-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--pink), var(--peach));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .cta-btn:hover::before { opacity: 0.12; }
        .cta-btn:hover {
            border-color: rgba(255, 179, 138, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.2);
        }

        .cta-left {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .cta-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255,179,138,0.2);
        }

        .cta-arrow {
            position: relative;
            z-index: 1;
            color: var(--peach);
            font-size: 13px;
            transition: transform 0.3s;
        }
        .cta-btn:hover .cta-arrow { transform: translateX(3px); }

        /* ── LINK CARDS ── */
        .link-list { display: flex; flex-direction: column; gap: 8px; }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--cream);
            background: var(--card);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            transition: all 0.25s;
        }
        .link-card:hover {
            border-color: var(--card-border-hover);
            background: rgba(255, 179, 138, 0.06);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(255, 179, 138, 0.08);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-img {
            width: 42px; height: 42px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255,179,138,0.15);
            background: #1a1015;
            flex-shrink: 0;
        }

        .link-info h3 {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        .link-info .sub {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 3px;
        }

        .online-dot {
            width: 6px; height: 6px;
            background: #4ade80;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        .online-dot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #4ade80;
            animation: dotPulse 2s ease-out infinite;
        }
        @keyframes dotPulse {
            0%   { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        .status-text {
            font-size: 11px;
            color: #4ade80;
        }

        .join-pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            transition: filter 0.2s;
        }
        .join-pill:hover { filter: brightness(1.15); }

        .pill-discord {
            background: linear-gradient(135deg, #5865F2, #7289DA);
            color: #fff;
        }
        .pill-roblox {
            background: linear-gradient(135deg, #E52207, #FF4444);
            color: #fff;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(255,245,238,0.2);
            text-transform: uppercase;
            padding: 8px 0;
        }

        /* ── SHIMMER on name ── */
        .shimmer {
            background: linear-gradient(90deg, var(--text-dim) 20%, #fff 40%, #fff 60%, var(--text-dim) 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            to { background-position: -200% center; }
        }

        @media (max-width: 380px) {
            .profile-name { font-size: 18px; }
            .avatar { width: 84px; height: 84px; }
            .cta-btn { font-size: 13px; }
        }
    </style>
</head>
<body>

<!-- Background -->
<div class="bg-layer"></div>
<canvas id="star-canvas"></canvas>

<!-- Entry -->
<div id="entry-layer" onclick="startWeb()">
    <img src="logo.png" class="entry-logo" alt="logo">
    <div class="entry-title">Peachza Store</div>
    <div class="entry-hint">[ Tap anywhere to enter ]</div>
</div>

<!-- Audio -->
<audio id="bg-music" loop>
    <source src="punstory2.mp4" type="audio/mpeg">
</audio>

<!-- Main -->
<div class="container" id="main-container">

    <!-- Profile Card -->
    <div class="card profile-card">
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <img src="fb.png" class="avatar" id="avatar-img" alt="avatar">
            <div class="view-badge"><i class="fa-solid fa-eye"></i> 12.8K</div>
        </div>

        <div class="profile-name">PEACHZA X STORE</div>
        <div class="profile-role">OWNER / CEO</div>

        <div class="divider"></div>

        <div class="profile-bio">
            <span class="bio-tag">Lua</span>
            <span class="bio-tag">HTML</span>
            <span class="bio-tag">CSS</span>
            <span class="bio-tag">JavaScript</span>
        </div>

        <div class="divider"></div>

        <div class="socials">
            <a href="https://www.facebook.com/share/1AGipwBwHp/" target="_blank" class="social-btn" title="Facebook">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="https://www.instagram.com/pexchzq_d" target="_blank" class="social-btn" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#" class="social-btn" title="TikTok">
                <i class="fa-brands fa-tiktok"></i>
            </a>
            <a href="#" class="social-btn" title="Gaming">
                <i class="fa-solid fa-gamepad"></i>
            </a>
            <a href="#" class="social-btn" title="YouTube">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
    </div>

    <!-- CTA Website -->
    <a href="https://peachzastore.rdcw.xyz/" target="_blank" class="cta-btn">
        <div class="cta-left">
            <img src="logo.png" class="cta-icon" alt="store logo">
            <span>PEACHZA STORE WEBSITE</span>
        </div>
        <i class="fa-solid fa-arrow-right cta-arrow"></i>
    </a>

    <!-- Links -->
    <div class="link-list">

        <!-- Roblox -->
        <a href="https://www.roblox.com/share?code=07e0aa3fd750ed4ab492329f4e02ca9a&type=Profile&source=ProfileShare&stamp=1769286159567" target="_blank" class="link-card">
            <div class="link-left">
                <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-5C83BD1F9A5E132F52AFE0318012C987-Png/150/150/AvatarHeadshot/Webp/noFilter" class="link-img" alt="roblox">
                <div class="link-info">
                    <h3>pexchzq_d</h3>
                    <div class="status-row">
                        <span class="online-dot"></span>
                        <span class="status-text">Online</span>
                    </div>
                    <div class="sub">23 Friends · Roblox</div>
                </div>
            </div>
            <div class="join-pill pill-roblox">Add</div>
        </a>

        <!-- Discord -->
        <a href="https://discord.gg/tYhXP4sF3C" target="_blank" class="link-card">
            <div class="link-left">
                <img src="discord.png" class="link-img" alt="discord">
                <div class="link-info">
                    <h3>Peachza Store</h3>
                    <div class="status-row">
                        <span class="online-dot"></span>
                        <span class="status-text">Online</span>
                    </div>
                    <div class="sub">143 Members · Discord</div>
                </div>
            </div>
            <div class="join-pill pill-discord">Join</div>
        </a>

    </div>

    <div class="footer">© Peachza Store · All rights reserved</div>
</div>

<script>
/* ── Shooting Stars ── */
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.addEventListener('resize', resize);
resize();

class Star {
    constructor() { this.reset(true); }
    reset(init = false) {
        const side = Math.random();
        if (side < 0.5) { this.x = Math.random() * canvas.width; this.y = -60; }
        else { this.x = -60; this.y = Math.random() * canvas.height; }
        if (init) { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; }
        this.len = 60 + Math.random() * 100;
        this.speed = 3 + Math.random() * 6;
        this.size = 0.4 + Math.random() * 1.2;
        this.opacity = 0;
        this.max = 0.08 + Math.random() * 0.25;
        this.hue = Math.random() > 0.6 ? '255,179,138' : '255,255,255';
    }
    draw() {
        const tx = this.x - this.len * 0.7;
        const ty = this.y - this.len * 0.35;
        const g = ctx.createLinearGradient(this.x, this.y, tx, ty);
        g.addColorStop(0, `rgba(${this.hue},${this.opacity})`);
        g.addColorStop(1, `rgba(${this.hue},0)`);
        ctx.beginPath();
        ctx.strokeStyle = g;
        ctx.lineWidth = this.size;
        ctx.lineCap = 'round';
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(tx, ty);
        ctx.stroke();
    }
    update() {
        this.x += this.speed;
        this.y += this.speed * 0.5;
        if (this.opacity < this.max) this.opacity += 0.008;
        if (this.x > canvas.width + 80 || this.y > canvas.height + 80) this.reset();
    }
}

for (let i = 0; i < 15; i++) stars.push(new Star());
(function loop() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.update(); s.draw(); }); requestAnimationFrame(loop); })();

/* ── Audio Visualizer ── */
let audioCtx, analyser, source;

function startWeb() {
    const layer = document.getElementById('entry-layer');
    const music = document.getElementById('bg-music');
    const avatar = document.getElementById('avatar-img');

    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        source = audioCtx.createMediaElementSource(music);
        source.connect(audioCtx.destination);
        source.connect(analyser);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();

    music.play().then(() => visualize(avatar)).catch(() => {});

    layer.classList.add('fade-out');
    setTimeout(() => layer.style.display = 'none', 1000);

    const mc = document.getElementById('main-container');
    mc.classList.remove('hidden');
}

function visualize(el) {
    const data = new Uint8Array(analyser.frequencyBinCount);
    (function frame() {
        requestAnimationFrame(frame);
        analyser.getByteFrequencyData(data);
        let bass = 0;
        for (let i = 0; i < 6; i++) bass += data[i];
        const avg = bass / 6;
        const glow = avg / 3;
        const op = avg / 255;
        if (avg > 12) {
            el.style.boxShadow = `0 0 ${glow/2}px rgba(255,255,255,${op+0.3}), 0 0 ${glow}px rgba(255,107,157,${op}), 0 0 ${glow*1.3}px rgba(255,179,138,${op*0.7})`;
        } else {
            el.style.boxShadow = '0 0 15px rgba(255,179,138,0.15)';
        }
    })();
}

// Hide container until entry is clicked
document.getElementById('main-container').classList.add('hidden');
</script>
</body>
</html>
