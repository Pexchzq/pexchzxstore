<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peachza_Store | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. การตั้งค่าพื้นฐาน (Base Setup)
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            padding-bottom: 40px;
            overflow-x: hidden;
            position: relative;
        }

        /* =========================================
           2. พื้นหลังและอนิเมชั่น (Background & Anim)
           ========================================= */
        /* --- เพิ่มเติม: สไตล์สำหรับ Canvas ดาวตก --- */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* อยู่หลังคอนเทนต์ แต่อยู่หน้า background-anim */
            pointer-events: none;
        }

        .background-anim {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #000 0%, #1a1a1a 100%);
            z-index: -2;
        }
        

        .shimmer-text {
            background: linear-gradient(to right, #888 20%, #fff 40%, #fff 60%, #888 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
            font-weight: bold;
        }

        @keyframes shine {
            to { background-position: -200% center; }
        }

        /* =========================================
           3. เลย์เอาต์หลัก (Main Container)
           ========================================= */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* =========================================
           4. การ์ดกระจก (Glass Effect)
           ========================================= */
        .glass-card {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 12px;
            transition: box-shadow 0.05s ease-out;
            z-index: 10;
        }

        .name-wrapper {
            position: relative;
            display: inline-block;
        }
        
        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .view-count {
            font-size: 11px;
            color: #ccc;
            background: rgba(255,255,255,0.15);
            padding: 2px 6px;
            border-radius: 8px;
            position: absolute;
            top: -5px;
            right: -25px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .bio {
            font-size: 12px;
            color: #aaa;
            line-height: 1.5;
            margin-top: 5px;
        }

        .social-pill {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 12px;
            border-radius: 50px;
            margin-top: 10px;
        }

        .social-link {
            color: #ccc;
            font-size: 20px;
            transition: transform 0.2s, color 0.2s;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .social-link:hover {
            color: #fff;
            transform: scale(1.2);
        }

        .setup-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: glowPulse 2s infinite ease-in-out;
            transition: 0.3s;
        }
        
        .setup-btn:hover {
            transform: translateY(-2px);
            animation: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.1); }
            50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4); }
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            background: rgba(255,255,255,0.03);
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .link-card:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.1);
            transform: translateX(3px);
        }

        .link-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .link-img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #333;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.9));
        }

        .link-info h3 {
            font-size: 13px;
            font-weight: 600;
        }

        .link-info p {
            font-size: 11px;
            color: #888;
        }

        .join-btn {
            background: rgba(255,255,255,0.1);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .online-dot {
            width: 7px; height: 7px;
            background-color: #4ade80;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px rgba(74, 222, 128, 0.5);
            position: relative;
        }
        .online-dot::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #4ade80; border-radius: 50%;
            animation: pulse 2s infinite ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* =========================================
           5. Entry Layer (หน้ากดก่อนเข้า)
           ========================================= */
        #entry-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #entry-layer.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        .entry-content p {
            color: white;
            font-size: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: textPulse 1.5s infinite alternate;
        }
        @keyframes textPulse {
            from { opacity: 0.6; }
            to { opacity: 1; }
        }

        @media (max-width: 380px) {
            .container { padding: 10px; }
            .glass-card { padding: 12px; }
            h1 { font-size: 18px; }
            .avatar { width: 80px; height: 80px; }
            .setup-btn { font-size: 13px; padding: 12px; }
        }
    </style>
</head>

    <script>
    // --- โค้ดระบบดาวตก (Shooting Stars) ---
    const starCanvas = document.getElementById('star-canvas');
    const starCtx = starCanvas.getContext('2d');
    let starsArray = [];

    function resizeCanvas() {
        starCanvas.width = window.innerWidth;
        starCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class ShootingStar {
        constructor() { this.reset(); }
        reset() {
            if (Math.random() > 0.5) {
                this.x = Math.random() * starCanvas.width;
                this.y = -50;
            } else {
                this.x = -50;
                this.y = Math.random() * starCanvas.height;
            }
            this.len = (Math.random() * 100) + 50;
            this.speed = (Math.random() * 8) + 3;
            this.size = (Math.random() * 1.5) + 0.5;
            this.opacity = 0;
            this.maxOpacity = Math.random() * 0.4 + 0.1;
        }
        draw() {
            const tailX = this.x - this.len;
            const tailY = this.y - (this.len * 0.5);
            const gradient = starCtx.createLinearGradient(this.x, this.y, tailX, tailY);
            gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            starCtx.beginPath();
            starCtx.strokeStyle = gradient;
            starCtx.lineWidth = this.size;
            starCtx.lineCap = 'round';
            starCtx.moveTo(this.x, this.y);
            starCtx.lineTo(tailX, tailY);
            starCtx.stroke();
        }
        update() {
            this.x += this.speed;
            this.y += this.speed * 0.5;
            if (this.opacity < this.maxOpacity) this.opacity += 0.01;
            if (this.x > starCanvas.width + this.len || this.y > starCanvas.height + this.len) this.reset();
        }
    }

    for (let i = 0; i < 12; i++) { starsArray.push(new ShootingStar()); }

    function animateStars() {
        starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
        starsArray.forEach(star => { star.update(); star.draw(); });
        requestAnimationFrame(animateStars);
    }
    animateStars();

    // --- โค้ดระบบหลักเดิมของคุณ ---
    let audioContext;
    let analyser;
    let source;
    let animationId;

    function startWeb() {
        const layer = document.getElementById('entry-layer');
        const music = document.getElementById('bg-music');
        const avatar = document.querySelector('.avatar');

        if (!audioContext) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioContext = new AudioContext();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source = audioContext.createMediaElementSource(music);
            source.connect(audioContext.destination);
            source.connect(analyser);
        }

        if (audioContext.state === 'suspended') { audioContext.resume(); }

        music.play().then(() => {
            visualize(avatar);
        }).catch(e => console.log("Audio error:", e));

        layer.classList.add('fade-out');
        setTimeout(() => { layer.style.display = 'none'; }, 800);
    }

    function visualize(element) {
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        function renderFrame() {
            requestAnimationFrame(renderFrame);
            analyser.getByteFrequencyData(dataArray);
            let bass = 0;
            for (let i = 0; i < 5; i++) { bass += dataArray[i]; }
            let avg = bass / 5;
            let glowRadius = (avg / 3.5);
            let opacity = (avg / 255);
            if (avg > 15) {
                element.style.boxShadow = `
                    0 0 ${glowRadius / 2}px rgba(255, 255, 255, ${opacity + 0.3}),
                    0 0 ${glowRadius}px rgba(255, 50, 150, ${opacity}),
                    0 0 ${glowRadius * 1.2}px rgba(88, 101, 242, ${opacity * 0.6})
                `;
                element.style.borderColor = `rgba(255, 255, 255, ${opacity + 0.2})`;
            } else {
                element.style.boxShadow = "0 0 15px rgba(255, 255, 255, 0.2)";
                element.style.borderColor = "rgba(255, 255, 255, 0.2)";
            }
        }
        renderFrame();
    }
    </script>
